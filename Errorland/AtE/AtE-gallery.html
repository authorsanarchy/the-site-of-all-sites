  padding:12px;
  color:white;
  font-size:24px;

  user-select:none;

.liz-prev { left:10px; }
.liz-next { right:10px; }
.liz-prev:hover, .liz-next:hover { background: rgba(0,0,0,0.7); }

/* Barebones gallery */
@media (max-width:768px){ .liz-prev,.liz-next{font-size:20px;padding:10px;} }

<script>
(function(){
  const slides = document.querySelectorAll('.liz-slide');
  const prev = document.querySelector('.liz-prev');
  const next = document.querySelector('.liz-next');
  let index = 0;
  let timer;

  function showSlide(n){
    slides.forEach(s => s.style.display='none');
    slides[n].style.display='block';
  }

  function nextSlide(){ index = (index+1)%slides.length; showSlide(index);}
  function prevSlide(){ index = (index-1+slides.length)%slides.length; showSlide(index); }

  next.addEventListener('click',()=>{ nextSlide(); resetTimer(); });
  prev.addEventListener('click',()=>{ prevSlide(); resetTimer(); });

  function startTimer(){ timer = setInterval(nextSlide,3000);}
  function resetTimer(){ clearInterval(timer); startTimer(); }

  showSlide(index);
  startTimer();
})();
</script>

    <script> 
const slideGallery = document.querySelector('.slides');
const slides = slideGallery.querySelectorAll('div');
const scrollbarThumb = document.querySelector('.thumb');
const slideCount = slides.length;
const slideHeight = 720;
const marginTop = 16;

const scrollThumb = () => {
  const index = Math.floor(slideGallery.scrollTop / slideHeight);
  scrollbarThumb.style.height = `${((index + 1) / slideCount) * slideHeight}px`;
};

const scrollToElement = el => {
  const index = parseInt(el.dataset.id, 10);
  slideGallery.scrollTo(0, index * slideHeight + marginTop);
};

document.querySelector('.thumbnails').innerHTML += [...slides]
  .map(
    (slide, i) => `<img src="${slide.querySelector('img').src}" data-id="${i}">`
  )
  .join('');

document.querySelectorAll('.thumbnails img').forEach(el => {
  el.addEventListener('click', () => scrollToElement(el));
});

slideGallery.addEventListener('scroll', e => scrollThumb());

scrollThumb();

    </script>
