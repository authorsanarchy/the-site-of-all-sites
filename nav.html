<html>
    <head>
        <title>Navigation Page</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
        <link rel="stylesheet" href="assets/css/nav.css" />
        <noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
    </head>
    <body class="is-preload">
        <h1 id="Heading">Browse By</h1>








<!--A grid to organize the overall layout-->
        <div class="grid-container" id="NavLayout">
            <div class="Dropdown" id="Medium">
                <div class="Head flex-container" id="MediumHead" onclick="toggleContent(0)">
                    <div class="arrow down medarrow"></div>
                    <div class="arrow up medarrow"></div>
                    <span style="flex-grow: 1; text-align: center;">Medium</span>
                </div>
                <div class="DropContent grid-container" id="MediumContent">
                    <p class="MediumName" id="MediumArtwork">Artwork </p>
                    <p class="MediumName" id="MediumPhotography">Photography</p>
                    <p class="MediumName" id="MediumFood">Food</p>
                    <p class="MediumName" id="MediumComics">Comics</p>
                    <p class="MediumName" id="MediumShort Stories">Short Stories</p>
                    <p class="MediumName" id="MediumPoetry">Poetry</p>
                   
                </div>
            </div>
            <div class="Dropdown" id="Contributor">
                <div class="Head flex-container" id="ContributorHead" onclick="toggleContent(1)">
                    <div class="arrow down contarrow"></div>
                    <div class="arrow up contarrow"></div>
                    <span style="flex-grow: 1; text-align: center;">Contributor</span>
                </div>
                <div class="DropContent grid-container" id="ContributorContent">
                    <div class="AContributor">
                        <p class="ContributorName" id="AceName">Ace</p>
                        <img src="images/acepfp.webp" alt="Ace's Profile"/>
                    </div>
                    <div class="AContributor">
                        <p class="ContributorName" id="DDName">Dragon-Daisy</p>
                        <img src="images/ddpfp.jpg" alt="Dragon Daisy's Profile"/>
                    </div>
                    <div class="AContributor">
                        <p class="ContributorName" id="ErrorName">Error</p>
                        <img src="images/Error.jpg" alt="Error's Profile"/>
                    </div>
                    <div class="AContributor">
                        <p class="ContributorName" id="GhostName">Ghost</p>
                        <img src="images/ghostpfp1.png" alt="Ghost's Profile"/>
                    </div>
                    <div class="AContributor">
                        <p class="ContributorName" id="LizName">Lizard</p>
                        <img src="images/lizardpfp.jpeg" alt="Lizard's Profile"/>
                    </div>
                    <div class="AContributor">
                        <p class="ContributorName" id="TinName">Tuyn</p>
                        <img src="images/tuynpfp.jpg" alt="Tuyn's Profile"/>
                    </div>
                </div>
            </div>
            <div>
                <div class="Head flex-container" id="WorldsHead" onclick="toggleContent(2)">
                    <div class="arrow down worldarrow"></div>
                    <div class="arrow up worldarrow"></div>
                    <span style="flex-grow: 1; text-align: center;">Universe</span>
                </div>
                <div class="DropContent grid-container" id="WorldsContent">
                    <div class="AWorld">
                        <p class="WorldName" id="AcademicPainName"><a href="pdfs/IB in pain.pdf">Academic Pain</a></p>
                    </div>
                    <div class="AWorld">
                        <p class="WorldName" id="AfterTheEndName">After the End</p>
                    </div>
                    <div class="AWorld">
                        <p class="WorldName" id="FeitalAnnarkiName">Feital Annarki</p>
                    </div>
                    <div class="AWorld">
                        <p class="WorldName" id="LaisName">Lais</p>
                    </div>
                    <div class="AWorld">
                        <p class="WorldName" id="Lean-toName">Lean-to</p>
                    </div>
                    <div class="AWorld">
                        <p class="WorldName" id="ManarisName">Manaris</p>
                    </div>
                    <div class="AWorld">
                        <p class="WorldName" id="PHARUSName">PHARUS</p>
                    </div>
                    <div class="AWorld">
                        <p class="WorldName" id="SabanName"><a href="pdfs/cafe saban.pdf">Saban</a></p>
                    </div>
                    <div class="AWorld">
                        <p class="WorldName" id="TheWorldIsEndingName"><a href="pdfs/the world is ending and we must prepare.pdf">The World Is Ending</a></p>
                    </div>
                    <div class="AWorld">
                        <p class="WorldName" id="ThingsUnseenName"><a href="pdfs/things unseen.pdf">Things Unseen</a></p>
                    </div>
                </div>
            </div>
        </div>
<!--A link to the javascript for dropdowns-->
        <script src="/assets/js/nav.js"></script>
    </body>
</html>
